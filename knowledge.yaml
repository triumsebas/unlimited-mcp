schema_version: 1

# ---------------------------------------------------------------------------
# Orchestrator profiles
# How each frontier orchestrator interacts with this MCP server.
# ---------------------------------------------------------------------------
orchestrators:
  claude-code:
    companion_file: CLAUDE.md
    tool_description_style: prose-with-example
    long_lived_session: true
    sandbox: orchestrator-controlled
    restart_semantics: stdio-reconnects
    notes:
      - "Use submit_task for any job expected to take >30s to avoid blocking the conversation."
      - "Skills (skills/delegate/) call MCP tools directly."
      - "configure_agent persists defaults; don't just remember them in context."
  codex:
    companion_file: AGENTS.md
    tool_description_style: prose-with-example
    long_lived_session: false
    sandbox: configurable
    restart_semantics: spawn-per-call
    notes:
      - "codex exec is one-shot; submit_task + get_job_result across sessions is the async pattern."
      - "When MCP runs inside Codex's sandbox, MCP cannot write outside it."
      - "Worker-question pattern (phase 2) requires polling within the session."
  generic:
    companion_file: AGENTS.md
    tool_description_style: minimal
    long_lived_session: false
    sandbox: unknown
    notes:
      - "Assume worst case: short session, no streaming, treat MCP as transactional."

# ---------------------------------------------------------------------------
# CLI agents (coding workers)
# command_template uses {prompt!q} for shell-quoted prompt, {files} for file list.
# ---------------------------------------------------------------------------
clis:
  aider:
    docs_url: "https://aider.chat/docs/"
    install_hint: "pip install aider-install && aider-install"
    command_template: "aider --message {prompt!q}"
    params:
      model:
        type: str
        default: null
        render: "--model {value!q}"
      git:
        type: bool
        default: true
        render:
          "true": "--git"
          "false": "--no-git"
      auto_commits:
        type: bool
        default: false
        render:
          "true": "--auto-commits"
          "false": "--no-auto-commits"
      yes_always:
        type: bool
        default: true
        render:
          "true": "--yes-always"
          "false": ""
    verified: false
  opencode:
    docs_url: "https://opencode.ai/docs"
    install_hint: "npm install -g opencode-ai  # or: brew install opencode"
    command_template: "opencode run {prompt!q}"
    params:
      model:
        type: str
        default: null
        render: "--model {value!q}"
      headless:
        type: bool
        default: false
        render:
          "true": "--headless"
          "false": ""
    verified: false
  smolagents:
    docs_url: "https://huggingface.co/docs/smolagents"
    install_hint: "pip install smolagents"
    command_template: "python -m smolagents.cli run {prompt!q}"
    params: {}
    verified: false

# ---------------------------------------------------------------------------
# LLM providers
# ---------------------------------------------------------------------------
providers:
  openai_compat:
    type: openai_compat
    docs_url: "https://platform.openai.com/docs"
    default_base_url: "https://api.openai.com/v1"
    well_known_models:
      - gpt-4o
      - gpt-4o-mini
      - deepseek-chat
  ollama:
    type: ollama
    docs_url: "https://ollama.ai/docs"
    default_base_url: "http://localhost:11434/v1"
    well_known_models:
      - llama3.2
      - mistral
      - codellama
  anthropic:
    type: anthropic
    docs_url: "https://docs.anthropic.com"
    well_known_models:
      - claude-sonnet-4-6
      - claude-haiku-4-5-20251001

# ---------------------------------------------------------------------------
# Shell-like argv detection
# Invocations matching these patterns are blocked unless
# safety.allow_shell_like_argv is true (and even then require confirm_token).
# ---------------------------------------------------------------------------
shell_like_argv:
  bash:
    inline_flags: ["-c", "-lc"]
  sh:
    inline_flags: ["-c"]
  zsh:
    inline_flags: ["-c"]
  python:
    inline_flags: ["-c", "-m"]
  python3:
    inline_flags: ["-c", "-m"]
  node:
    inline_flags: ["-e", "-p"]
  perl:
    inline_flags: ["-e"]
  ruby:
    inline_flags: ["-e"]

# ---------------------------------------------------------------------------
# Sysops tools — safety classification with flag-based escalation/demotion.
# ---------------------------------------------------------------------------
tools:
  # --- read-only ---
  ls:
    safety_class: read
  cat:
    safety_class: read
  head:
    safety_class: read
  tail:
    safety_class: read
  echo:
    safety_class: read
  sleep:
    safety_class: read
  grep:
    safety_class: read
  rg:
    safety_class: read
    path_flags:
      - {flag: "--glob", style: separate_or_equals}
  jq:
    safety_class: read
  fd:
    safety_class: read
  find:
    safety_class: read
  wc:
    safety_class: read
  sort:
    safety_class: read
  uniq:
    safety_class: read
  diff:
    safety_class: read
  stat:
    safety_class: read
  which:
    safety_class: read
  env:
    safety_class: read
  printenv:
    safety_class: read
  uname:
    safety_class: read
  df:
    safety_class: read
  du:
    safety_class: read
  ps:
    safety_class: read
  top:
    safety_class: read
  uptime:
    safety_class: read
  # --- git (base: read; subcommands escalate) ---
  git:
    safety_class: read
    flag_patterns:
      - {match: ["commit", "push", "merge", "rebase", "reset", "clean", "checkout", "switch", "stash", "tag"], escalates_to: mutating}
      - {match: ["--force", "-f", "--force-with-lease"], escalates_to: dangerous}
  # --- mutating ---
  cp:
    safety_class: mutating
  mv:
    safety_class: mutating
  mkdir:
    safety_class: mutating
  touch:
    safety_class: mutating
  chmod:
    safety_class: mutating
  chown:
    safety_class: mutating
  sed:
    safety_class: mutating
  awk:
    safety_class: mutating
  curl:
    safety_class: mutating
  wget:
    safety_class: mutating
  tar:
    safety_class: mutating
    path_flags:
      - {flag: "-C", style: separate}
      - {flag: "-f", style: separate_or_equals}
  zip:
    safety_class: mutating
  unzip:
    safety_class: mutating
  pip:
    safety_class: mutating
  pip3:
    safety_class: mutating
  npm:
    safety_class: mutating
  uv:
    safety_class: mutating
  # --- dangerous ---
  rm:
    safety_class: mutating
    flag_patterns:
      - {match: ["-rf", "-fr", "-r", "--recursive"], escalates_to: dangerous}
  scp:
    safety_class: dangerous
  rsync:
    safety_class: dangerous
  kubectl:
    safety_class: mutating
    flag_patterns:
      - {match: ["delete", "apply", "patch", "replace", "rollout"], escalates_to: dangerous}
      - {match: ["get", "describe", "logs", "top", "explain"], demotes_to: read}
    path_flags:
      - {flag: "-f", style: separate_or_equals}
      - {flag: "--filename", style: separate_or_equals}
      - {flag: "--kubeconfig", style: separate_or_equals}

# ---------------------------------------------------------------------------
# Workspace presets
# ---------------------------------------------------------------------------
workspace_presets:
  safe_dev:
    mode: git_worktree
    result: leave_branch
    dirty: refuse
  quick_edit:
    mode: current
    result: apply_direct
    dirty: refuse
  read_only:
    mode: current
    result: report_only
    dirty: allow
  sysops_local:
    mode: none
    result: report_only
  sysops_remote:
    mode: remote_cwd
    result: report_only
  destructive_apply:
    mode: none
    result: apply_direct
