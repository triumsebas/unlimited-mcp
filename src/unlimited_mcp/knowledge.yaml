schema_version: 1

# ---------------------------------------------------------------------------
# Orchestrator profiles
# How each frontier orchestrator interacts with this MCP server.
# ---------------------------------------------------------------------------
orchestrators:
  claude-code:
    companion_file: CLAUDE.md
    tool_description_style: prose-with-example
    long_lived_session: true
    sandbox: orchestrator-controlled
    restart_semantics: stdio-reconnects
    notes:
      - "Use submit_task for any job expected to take >30s to avoid blocking the conversation."
      - "Skills (skills/delegate/) call MCP tools directly."
      - "configure_agent persists defaults; don't just remember them in context."
  codex:
    companion_file: AGENTS.md
    tool_description_style: prose-with-example
    long_lived_session: false
    sandbox: configurable
    restart_semantics: spawn-per-call
    notes:
      - "codex exec is one-shot; submit_task + get_job_result across sessions is the async pattern."
      - "When MCP runs inside Codex's sandbox, MCP cannot write outside it."
      - "Worker-question pattern (phase 2) requires polling within the session."
  generic:
    companion_file: AGENTS.md
    tool_description_style: minimal
    long_lived_session: false
    sandbox: unknown
    notes:
      - "Assume worst case: short session, no streaming, treat MCP as transactional."

# ---------------------------------------------------------------------------
# CLI agents (coding workers)
# command_template uses {prompt} for the prompt text, {files} for file list.
# ---------------------------------------------------------------------------
clis:
  aider:
    docs_url: "https://aider.chat/docs/"
    install_hint: "pip install aider-install && aider-install"
    command_template: "aider --message {prompt}"
    params:
      model:
        type: str
        default: null
        render: "--model {value}"
      git:
        type: bool
        default: true
        render:
          "true": "--git"
          "false": "--no-git"
      auto_commits:
        type: bool
        default: false
        render:
          "true": "--auto-commits"
          "false": "--no-auto-commits"
      yes_always:
        type: bool
        default: true
        render:
          "true": "--yes-always"
          "false": ""
      openai_api_base:
        type: str
        default: null
        render: "--openai-api-base {value}"
      no_show_model_warnings:
        type: bool
        default: false
        render:
          "true": "--no-show-model-warnings"
          "false": ""
      no_stream:
        type: bool
        default: false
        render:
          "true": "--no-stream"
          "false": ""
    verified: false
  claude:
    docs_url: "https://docs.anthropic.com/claude-code"
    install_hint: "npm install -g @anthropic-ai/claude-code"
    command_template: "claude -p --dangerously-skip-permissions"
    prompt_via: stdin
    params: {}
    verified: true
  codex:
    docs_url: "https://github.com/openai/codex"
    install_hint: "brew install codex"
    command_template: "codex exec {prompt}"
    stdin_command_template: "codex exec -s workspace-write -"
    prompt_via: stdin
    params: {}
    verified: false
  opencode:
    docs_url: "https://opencode.ai/docs"
    # OpenCode Go zen endpoint: https://opencode.ai/zen/go/v1 (OpenAI-compat)
    # exposes deepseek-v4-flash / deepseek-v4-pro. Do not confuse with
    # https://opencode.ai/zen/v1 which serves a different model set (no deepseek).
    install_hint: "npm install -g opencode-ai  # or: brew install opencode"
    command_template: "opencode run --format json"
    prompt_via: stdin
    params:
      model:
        type: str
        default: null
        render: "--model {value}"
    verified: false
  smolagents:
    docs_url: "https://huggingface.co/docs/smolagents"
    install_hint: "pip install 'smolagents[litellm]'"
    command_template: "smolagents {prompt}"
    prompt_via: arg
    params:
      model_id:
        type: str
        default: null
        render: "--model-id {value}"
    verified: false
  goose:
    docs_url: "https://block.github.io/goose/"
    install_hint: "curl -fsSL https://github.com/block/goose/releases/latest/download/install.sh | GOOSE_SKIP_UPDATE=1 bash"
    # Inline prompts use -t; large prompts fall back to stdin via -i -
    command_template: "goose run -t {prompt} --quiet"
    stdin_command_template: "goose run -i - --quiet"
    prompt_via: arg_with_stdin_fallback
    params:
      model:
        type: str
        default: null
        render: "--model {value}"
      provider:
        type: str
        default: null
        render: "--provider {value}"
    verified: false
  hermes:
    docs_url: "https://github.com/Josephrp/hermes-agent"
    install_hint: "pip install hermes-agent"
    # -z is the one-shot (non-interactive) flag; --yolo skips tool-call
    # confirmation prompts. Verified empirically: `hermes -z "prompt"`,
    # `-m <model>`, `--provider <name>` (there is no `chat` subcommand and
    # the one-shot flag is -z, not -q). stdin mode is unverified.
    command_template: "hermes -z {prompt} --yolo"
    stdin_command_template: "hermes --yolo"
    prompt_via: arg_with_stdin_fallback
    params:
      model:
        type: str
        default: null
        render: "-m {value}"
      provider:
        type: str
        default: null
        render: "--provider {value}"
    verified: false
  cline:
    docs_url: "https://docs.cline.bot/cline-cli/getting-started"
    install_hint: "npm install -g cline"
    # --yolo skips all tool-call approval prompts (fully autonomous).
    # Large prompts fall back to stdin: `cline --yolo` reads from stdin when piped.
    command_template: "cline --yolo {prompt}"
    stdin_command_template: "cline --yolo"
    prompt_via: arg_with_stdin_fallback
    params:
      model:
        type: str
        default: null
        render: "--model {value}"
    verified: false
  jcode:
    docs_url: "https://jcode.ai/docs"
    install_hint: "curl -fsSL https://jcode.ai/install.sh | bash"
    # Prompt always goes as a positional arg; even large prompts work fine this way.
    # --quiet suppresses token usage lines; --no-update prevents auto-updates mid-run.
    # No skip-permissions flag needed: jcode executes tool calls without prompting.
    command_template: "jcode run --quiet --no-update {prompt}"
    prompt_via: arg
    params:
      provider:
        type: str
        default: null
        render: "--provider {value}"
      model:
        type: str
        default: null
        render: "--model {value}"
    verified: true

# ---------------------------------------------------------------------------
# LLM providers
# ---------------------------------------------------------------------------
providers:
  openai_compat:
    type: openai_compat
    docs_url: "https://platform.openai.com/docs"
    default_base_url: "https://api.openai.com/v1"
    well_known_models:
      - gpt-4o
      - gpt-4o-mini
      - deepseek-chat
  ollama:
    type: ollama
    docs_url: "https://ollama.ai/docs"
    # localhost default; set OLLAMA_API_BASE to point at a remote host,
    # e.g. OLLAMA_API_BASE=http://192.168.1.x:11434
    default_base_url: "http://localhost:11434/v1"
    well_known_models:
      - llama3.2
      - mistral
      - codellama
  mlx_lm:
    type: mlx_lm
    docs_url: "https://github.com/ml-explore/mlx-lm"
    default_base_url: "http://localhost:8080/v1"
    well_known_models:
      - mlx-community/Qwen2.5-Coder-32B-Instruct-4bit
      - mlx-community/DeepSeek-R1-0528-8bit
      - mlx-community/gemma-3-27b-it-4bit
  gemini:
    type: gemini
    docs_url: "https://ai.google.dev/gemini-api/docs/openai"
    # 2.5 Flash works on the free tier; 2.5 Pro and 3.x require billing
    # enabled in Google AI Studio. Free tier has a strict rate limit.
    default_base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
    well_known_models:
      - gemini-2.5-flash-preview-05-20
      - gemini-2.5-pro-preview-06-05
      - gemini-2.0-flash
  groq:
    type: groq
    docs_url: "https://console.groq.com/docs/openai"
    # Free tier is capped at ~6k TPM — agents with large system prompts
    # (e.g. jcode ~11k tokens) exceed it and are not viable on free tier.
    default_base_url: "https://api.groq.com/openai/v1"
    well_known_models:
      - llama-3.3-70b-versatile
      - llama3-70b-8192
      - mixtral-8x7b-32768
  openrouter:
    type: openrouter
    docs_url: "https://openrouter.ai/docs"
    default_base_url: "https://openrouter.ai/api/v1"
    well_known_models:
      - google/gemini-2.5-flash-preview
      - deepseek/deepseek-chat-v3-0324
      - anthropic/claude-sonnet-4-6
  anthropic:
    type: anthropic
    docs_url: "https://docs.anthropic.com"
    well_known_models:
      - claude-sonnet-4-6
      - claude-haiku-4-5-20251001

# ---------------------------------------------------------------------------
# Shell-like argv detection
# Invocations matching these patterns are blocked unless
# safety.allow_shell_like_argv is true (and even then require confirm_token).
# ---------------------------------------------------------------------------
shell_like_argv:
  bash:
    inline_flags: ["-c", "-lc"]
  sh:
    inline_flags: ["-c"]
  zsh:
    inline_flags: ["-c"]
  python:
    inline_flags: ["-c", "-m"]
  python3:
    inline_flags: ["-c", "-m"]
  node:
    inline_flags: ["-e", "-p"]
  perl:
    inline_flags: ["-e"]
  ruby:
    inline_flags: ["-e"]

# ---------------------------------------------------------------------------
# Sysops tools — safety classification with flag-based escalation/demotion.
# ---------------------------------------------------------------------------
tools:
  # --- read-only ---
  ls:
    safety_class: read
  cat:
    safety_class: read
  head:
    safety_class: read
  tail:
    safety_class: read
  echo:
    safety_class: read
  sleep:
    safety_class: read
  grep:
    safety_class: read
  rg:
    safety_class: read
    path_flags:
      - {flag: "--glob", style: separate_or_equals}
  jq:
    safety_class: read
  fd:
    safety_class: read
  find:
    safety_class: read
  wc:
    safety_class: read
  sort:
    safety_class: read
  uniq:
    safety_class: read
  diff:
    safety_class: read
  stat:
    safety_class: read
  which:
    safety_class: read
  env:
    safety_class: read
  printenv:
    safety_class: read
  uname:
    safety_class: read
  df:
    safety_class: read
  du:
    safety_class: read
  ps:
    safety_class: read
  top:
    safety_class: read
  uptime:
    safety_class: read
  # --- git (base: read; subcommands escalate) ---
  git:
    safety_class: read
    flag_patterns:
      - {match: ["commit", "push", "merge", "rebase", "reset", "clean", "checkout", "switch", "stash", "tag"], escalates_to: mutating}
      - {match: ["--force", "-f", "--force-with-lease"], escalates_to: dangerous}
  # --- mutating ---
  cp:
    safety_class: mutating
  mv:
    safety_class: mutating
  mkdir:
    safety_class: mutating
  touch:
    safety_class: mutating
  chmod:
    safety_class: mutating
  chown:
    safety_class: mutating
  sed:
    safety_class: mutating
  awk:
    safety_class: mutating
  curl:
    safety_class: mutating
  wget:
    safety_class: mutating
  tar:
    safety_class: mutating
    path_flags:
      - {flag: "-C", style: separate}
      - {flag: "-f", style: separate_or_equals}
  zip:
    safety_class: mutating
  unzip:
    safety_class: mutating
  pip:
    safety_class: mutating
  pip3:
    safety_class: mutating
  npm:
    safety_class: mutating
  uv:
    safety_class: mutating
  # --- dangerous ---
  rm:
    safety_class: mutating
    flag_patterns:
      - {match: ["-rf", "-fr", "-r", "--recursive"], escalates_to: dangerous}
  scp:
    safety_class: dangerous
  rsync:
    safety_class: dangerous
  kubectl:
    safety_class: mutating
    flag_patterns:
      - {match: ["delete", "apply", "patch", "replace", "rollout"], escalates_to: dangerous}
      - {match: ["get", "describe", "logs", "top", "explain"], demotes_to: read}
    path_flags:
      - {flag: "-f", style: separate_or_equals}
      - {flag: "--filename", style: separate_or_equals}
      - {flag: "--kubeconfig", style: separate_or_equals}

# ---------------------------------------------------------------------------
# Workspace presets
# ---------------------------------------------------------------------------
workspace_presets:
  safe_dev:
    mode: git_worktree
    result: leave_branch
    dirty: refuse
  quick_edit:
    mode: current
    result: apply_direct
    dirty: refuse
  read_only:
    mode: current
    result: report_only
    dirty: allow
  sysops_local:
    mode: none
    result: report_only
  sysops_remote:
    mode: remote_cwd
    result: report_only
  destructive_apply:
    mode: none
    result: apply_direct
