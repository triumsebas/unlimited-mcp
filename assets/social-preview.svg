<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1c0800"/>
    </linearGradient>
    <linearGradient id="inf" x1="0%" y1="100%" x2="60%" y2="0%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="50%" stop-color="#ff4500"/>
      <stop offset="100%" stop-color="#ffb700"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>

  <!-- Background card (bleeds to edge — not content) -->
  <rect width="1280" height="640" rx="28" fill="url(#bg)"/>

  <!-- Top accent glow -->
  <rect x="64" y="64" width="1152" height="4" rx="2" fill="url(#inf)" opacity="0.55"/>

  <!-- Safe area: all content kept within x[64,1216] y[64,576] (>=40pt border) -->

  <!-- ∞ symbol (hero element, scaled) -->
  <text x="300" y="430"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="260"
        fill="url(#inf)"
        opacity="0.95">∞</text>

  <!-- Vertical divider (hero element) -->
  <line x1="480" y1="190" x2="480" y2="450" stroke="#334155" stroke-width="2" opacity="0.7"/>

  <!-- Project name -->
  <text x="520" y="335"
        font-family="ui-monospace, 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace"
        font-size="80"
        fill="url(#title)"
        font-weight="600"
        letter-spacing="-1">unlimited-mcp</text>

  <!-- Tagline (hero copy) -->
  <text x="522" y="400"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="32"
        fill="#7dd3fc"
        letter-spacing="0.3">Tired of burning your limits? Go unlimited.</text>
</svg>
