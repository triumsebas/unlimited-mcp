<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1c0800"/>
    </linearGradient>
    <linearGradient id="inf" x1="0%" y1="100%" x2="60%" y2="0%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="50%" stop-color="#ff4500"/>
      <stop offset="100%" stop-color="#ffb700"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>

  <!-- Background card (bleeds to edge — not content) -->
  <rect width="400" height="400" rx="72" fill="url(#bg)"/>

  <!-- Safe area: all content kept within x[40,360] y[40,360] (40pt border) -->

  <!-- Top accent glow -->
  <rect x="70" y="56" width="260" height="4" rx="2" fill="url(#inf)" opacity="0.55"/>

  <!-- ∞ symbol -->
  <text x="200" y="222"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="160"
        fill="url(#inf)"
        opacity="0.97">∞</text>

  <!-- Project name -->
  <text x="200" y="300"
        text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace"
        font-size="38"
        fill="url(#title)"
        font-weight="600"
        letter-spacing="-1">unlimited-mcp</text>

  <!-- Tagline -->
  <text x="200" y="338"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18"
        fill="#7dd3fc"
        letter-spacing="0.3">Go unlimited.</text>
</svg>
