<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" width="900" height="160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1c0800"/>
    </linearGradient>
    <linearGradient id="inf" x1="0%" y1="100%" x2="60%" y2="0%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="50%" stop-color="#ff4500"/>
      <stop offset="100%" stop-color="#ffb700"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>

  <!-- Background card -->
  <rect width="900" height="160" rx="14" fill="url(#bg)"/>

  <!-- Subtle top border glow -->
  <rect width="900" height="2" rx="1" fill="url(#inf)" opacity="0.6"/>

  <!-- ∞ symbol -->
  <text x="100" y="118"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="114"
        fill="url(#inf)"
        opacity="0.95">∞</text>

  <!-- Vertical divider -->
  <line x1="168" y1="28" x2="168" y2="132" stroke="#334155" stroke-width="1" opacity="0.7"/>

  <!-- Project name -->
  <text x="192" y="88"
        font-family="ui-monospace, 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace"
        font-size="42"
        fill="url(#title)"
        font-weight="600"
        letter-spacing="-0.5">unlimited-mcp</text>

  <!-- Tagline -->
  <text x="194" y="122"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="17"
        fill="#7dd3fc"
        letter-spacing="0.2">Tired of burning your limits? Go unlimited.</text>
</svg>
